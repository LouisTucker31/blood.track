<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blood Marker Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<header class="app-header">
  <div class="logo">blood<span>.</span>track</div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="setView('add')">Add Entry</button>
    <button class="nav-tab" onclick="setView('history')">History</button>
    <button class="nav-tab" onclick="setView('charts')">Charts</button>
  </nav>
</header>

<div class="views-wrapper">
  <div class="views-container" id="views-container">

    <!-- ADD VIEW -->
    <div class="view" id="view-add">
      <div class="view-inner">

        <!-- PANEL MODE FORM -->
        <div id="panel-form" style="display:none;">
          <div class="panel-header">
            <div class="panel-header-left">
              <div class="panel-test-name" id="panel-test-name"></div>
              <button class="panel-back-btn" onclick="exitPanelMode()">← Single marker</button>
            </div>
            <div class="field panel-date-field">
              <label>Date</label>
              <input type="date" id="panel-date" />
            </div>
          </div>

          <div class="card" style="margin-bottom:1rem;">
            <div class="field" style="margin-bottom:0;">
              <label>Notes (shared across all markers)</label>
              <input type="text" id="panel-notes" placeholder="e.g. fasted, morning sample…" />
            </div>
          </div>

          <div class="card" style="margin-bottom:1rem;">
            <div class="card-title">Markers</div>
            <div id="panel-rows"></div>

            <!-- extra marker picker -->
            <div id="panel-extra-picker" style="display:none;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
              <select id="panel-extra-marker-sel" onchange="onPanelExtraMarkerChange()" class="panel-extra-sel">
                <option value="">— Select marker —</option>
              </select>
              <select id="panel-extra-unit-sel" class="panel-extra-sel" style="max-width:110px;">
                <option value="">—</option>
              </select>
              <button class="btn-primary" style="width:auto;padding:0 14px;height:38px;flex-shrink:0;" onclick="confirmPanelExtraRow()">Add</button>
            </div>

            <button class="panel-add-extra-btn" onclick="addPanelExtraRow()">+ Add extra marker</button>
          </div>

          <div style="display:flex;gap:8px;align-items:center;">
            <button class="btn-primary" style="flex:1;" onclick="savePanelTest()">Save Test</button>
            <button class="panel-delete-tmpl-btn" id="panel-delete-tmpl-btn" style="display:none;flex:0 0 auto;height:44px;padding:0 18px;border-radius:var(--radius);border:1px solid var(--red);background:none;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;" onclick="deletePanelTemplate()">Delete</button>
          </div>
        </div>

        <!-- SINGLE MARKER FORM (existing) -->
        <div id="single-marker-form">
        <div class="add-grid">
          <div class="card">
            <div class="card-title">Log a result</div>
            <div class="cat-pills" id="cat-pills"></div>
            <div class="field">
              <label>Marker</label>
              <select id="marker-select" onchange="onMarkerChange()"></select>
            </div>
            <div class="field-row">
              <div class="field">
                <label>Value</label>
                <input type="number" id="entry-value" step="any" placeholder="e.g. 5.2" />
              </div>
              <div class="field">
                <label>Date</label>
                <input type="date" id="entry-date" />
              </div>
            </div>
            <div id="unit-display" class="unit-hint"></div>
            <div id="range-display" class="range-hint"></div>
            <div class="field" style="margin-top:1rem;">
              <label>Notes (optional)</label>
              <input type="text" id="entry-notes" placeholder="e.g. fasted, morning sample…" />
            </div>
            <button class="btn-primary" onclick="addEntry()">Save result</button>
          </div>

          <div class="card">
            <div class="card-title">Reference ranges</div>
            <div id="ref-info" style="color:var(--text-muted);font-size:13px;">Select a marker to see its reference range.</div>
          </div>
        </div>
        </div><!-- /single-marker-form -->
      </div>
    </div>

    <!-- HISTORY VIEW -->
    <div class="view" id="view-history">
      <div class="view-inner">
        <div class="section-header">
          <div class="section-title">All Results</div>
          <button class="btn-icon" style="width:auto;padding:0 12px;font-size:12px;font-weight:600;color:var(--text-muted);" onclick="exportData()">Export PDF</button>
        </div>
        <div class="filter-bar">
          <input type="text" id="search-input" placeholder="Search marker…" oninput="renderHistory()" />
          <select id="cat-filter" onchange="renderHistory()">
            <option value="">All categories</option>
          </select>
          <select id="sort-select" onchange="renderHistory()">
            <option value="date-desc">Newest first</option>
            <option value="date-asc">Oldest first</option>
            <option value="marker">Marker A–Z</option>
          </select>
        </div>
        <div class="results-list" id="results-list"></div>
      </div>
    </div>

    <!-- CHARTS VIEW -->
    <div class="view" id="view-charts">
      <div class="view-inner">
        <div class="charts-header">
          <div class="section-title" style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:.5rem;">Trends</div>
          <div style="font-size:13px;color:var(--text-muted);">Select a marker below to view its history as a chart.</div>
        </div>
        <select class="mobile-marker-select" id="mobile-marker-select"></select>
        <div class="marker-select-grid" id="marker-chips"></div>
        <div id="charts-area"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>
<!-- Template Modal -->
<div class="template-modal-backdrop" id="template-modal" onclick="handleBackdropClick(event)">
  <div class="template-modal-box">
    <div class="template-modal-header">
      <div class="template-modal-title">New Test Template</div>
      <button class="btn-icon" onclick="closeTemplateModal()">✕</button>
    </div>

    <div class="field" style="margin-bottom:1.25rem;">
      <label>Test Name</label>
      <input type="text" id="tmpl-name" placeholder="e.g. Hormone Panel, Annual Check…" />
    </div>

    <div class="tmpl-section-label">Markers in this test</div>
    <div id="tmpl-marker-list" class="tmpl-marker-list"></div>

    <div class="tmpl-add-row">
      <select id="tmpl-mk-name" onchange="onTmplMarkerPickChange()">
        <option value="">— Select a marker —</option>
      </select>
      <select id="tmpl-mk-unit">
        <option value="">— Unit —</option>
      </select>
      <button class="btn-primary tmpl-add-btn" onclick="addDraftMarker()">Add</button>
    </div>

    <div class="tmpl-footer">
      <div id="tmpl-delete-wrap" style="display:none;">
        <button class="btn-primary tmpl-delete-full-btn" id="tmpl-delete-btn" onclick="deleteTemplate(editingTemplateId)">Delete template</button>
      </div>
      <div style="display:flex;gap:8px;margin-left:auto;">
        <button class="tmpl-cancel-btn" onclick="closeTemplateModal()">Cancel</button>
        <button class="btn-primary" style="width:auto;padding:0 20px;" onclick="saveTemplate()">Save</button>
      </div>
    </div>
  </div>
</div>
